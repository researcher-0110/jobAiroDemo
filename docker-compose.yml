name: jobairo

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    env_file: .env
    environment:
      - NODE_ENV=production
    networks:
      - jobairo
    depends_on:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file: .env
    networks:
      - jobairo
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  scraper:
    build:
      context: ./scraper
      dockerfile: Dockerfile
    env_file: .env
    networks:
      - jobairo
    profiles:
      - scraper
    volumes:
      - scraper_logs:/var/log/jobairo
      - scraper_jobs:/tmp/scrapy_jobs
    restart: no

  caddy:
    image: caddy:2-alpine
    env_file: .env
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - jobairo
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

networks:
  jobairo:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
  scraper_logs:
  scraper_jobs:
