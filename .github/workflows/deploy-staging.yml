name: Deploy to Staging

on:
  push:
    branches:
      - main
      - develop

jobs:
  deploy:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.STAGING_SSH_KEY }}

      - name: Add host to known_hosts
        run: ssh-keyscan -H ${{ secrets.STAGING_HOST }} >> ~/.ssh/known_hosts

      - name: Pull latest code
        run: |
          ssh ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }} \
            "cd /opt/jobairo/staging/jobAiroDemo && git pull origin ${{ github.ref_name }}"

      - name: Build & deploy backend
        run: |
          ssh ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }} << 'EOF'
            set -e
            cd /opt/jobairo/staging/jobAiroDemo
            docker compose build --no-cache backend
            docker compose up -d backend
            sleep 15
            curl -sf http://localhost:8000/health || (echo "Backend health check FAILED" && exit 1)
            echo "Backend deployed successfully."
          EOF

      - name: Build & deploy frontend
        continue-on-error: true
        run: |
          ssh ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }} << 'EOF'
            set -e
            cd /opt/jobairo/staging/jobAiroDemo
            docker compose build --no-cache \
              --build-arg NEXT_PUBLIC_SITE_URL=${{ secrets.NEXT_PUBLIC_SITE_URL }} \
              --build-arg NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }} \
              --build-arg NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }} \
              --build-arg NEXT_PUBLIC_BACKEND_URL=${{ secrets.NEXT_PUBLIC_BACKEND_URL }} \
              frontend
            docker compose up -d frontend
            echo "Frontend deployed successfully."
          EOF

      - name: Reload Caddy
        if: always()
        run: |
          ssh ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }} \
            "cd /opt/jobairo/staging/jobAiroDemo && docker compose exec caddy caddy reload --config /etc/caddy/Caddyfile"
