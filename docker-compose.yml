name: jobairo

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    env_file: .env
    environment:
      - NODE_ENV=production
    networks:
      - jobairo
    depends_on:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file: .env
    networks:
      - jobairo
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  scraper:
    build:
      context: ./scraper
      dockerfile: Dockerfile
    env_file: .env
    networks:
      - jobairo
    profiles:
      - scraper
    volumes:
      - scraper_logs:/var/log/jobairo
      - scraper_jobs:/tmp/scrapy_jobs
    restart: no

  dozzle:
    image: amir20/dozzle:latest
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./dozzle:/data
    environment:
      DOZZLE_BASE: /dozzle
      DOZZLE_AUTH_PROVIDER: simple
      DOZZLE_NO_ANALYTICS: "true"
      DOZZLE_LEVEL: info
    networks:
      - jobairo
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    env_file: .env
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - jobairo
    depends_on:
      - frontend
      - backend
      - dozzle
    restart: unless-stopped

networks:
  jobairo:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
  scraper_logs:
  scraper_jobs:
