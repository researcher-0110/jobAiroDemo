name: Deploy to Staging

on:
  push:
    branches:
      - main
      - develop

jobs:
  deploy:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.STAGING_SSH_KEY }}

      - name: Add host to known_hosts
        run: ssh-keyscan -H ${{ secrets.STAGING_HOST }} >> ~/.ssh/known_hosts

      - name: Pull latest code
        run: |
          ssh ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }} \
            "cd /opt/jobairo/staging/jobAiroDemo && git pull origin ${{ github.ref_name }}"

      - name: Write root .env
        env:
          DOTENV: |
            CADDY_ACME_EMAIL=${{ secrets.CADDY_ACME_EMAIL }}
            NEXT_PUBLIC_SITE_URL=${{ secrets.NEXT_PUBLIC_SITE_URL }}
            NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
            NEXT_PUBLIC_BACKEND_URL=${{ secrets.NEXT_PUBLIC_BACKEND_URL }}
            BACKEND_URL=http://backend:8000
            SUPABASE_URL=${{ secrets.SUPABASE_URL }}
            SUPABASE_SERVICE_KEY=${{ secrets.SUPABASE_SERVICE_KEY }}
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            CORS_ORIGINS=${{ secrets.CORS_ORIGINS }}
            ENVIRONMENT=staging
            PROXY_URL=${{ secrets.PROXY_URL }}
            PROXY_USER=${{ secrets.PROXY_USER }}
            PROXY_PASS=${{ secrets.PROXY_PASS }}
            SMTP_HOST=${{ secrets.SMTP_HOST }}
            SMTP_USER=${{ secrets.SMTP_USER }}
            SMTP_PASS=${{ secrets.SMTP_PASS }}
            ALERT_EMAIL=${{ secrets.ALERT_EMAIL }}
        run: |
          printf '%s' "$DOTENV" | base64 | ssh ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }} \
            "base64 -d > /opt/jobairo/staging/jobAiroDemo/.env"

      - name: Write frontend .env
        env:
          DOTENV: |
            NEXT_PUBLIC_SITE_URL=${{ secrets.NEXT_PUBLIC_SITE_URL }}
            NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
            NEXT_PUBLIC_BACKEND_URL=${{ secrets.NEXT_PUBLIC_BACKEND_URL }}
            BACKEND_URL=http://backend:8000
        run: |
          printf '%s' "$DOTENV" | base64 | ssh ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }} \
            "base64 -d > /opt/jobairo/staging/jobAiroDemo/frontend/.env"

      - name: Write backend .env
        env:
          DOTENV: |
            SUPABASE_URL=${{ secrets.SUPABASE_URL }}
            SUPABASE_SERVICE_KEY=${{ secrets.SUPABASE_SERVICE_KEY }}
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            CORS_ORIGINS=${{ secrets.CORS_ORIGINS }}
            PROXY_URL=${{ secrets.PROXY_URL }}
            PROXY_USER=${{ secrets.PROXY_USER }}
            PROXY_PASS=${{ secrets.PROXY_PASS }}
            SMTP_HOST=${{ secrets.SMTP_HOST }}
            SMTP_USER=${{ secrets.SMTP_USER }}
            SMTP_PASS=${{ secrets.SMTP_PASS }}
            ALERT_EMAIL=${{ secrets.ALERT_EMAIL }}
            ENVIRONMENT=staging
        run: |
          printf '%s' "$DOTENV" | base64 | ssh ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }} \
            "base64 -d > /opt/jobairo/staging/jobAiroDemo/backend/.env"

      - name: Write scraper .env
        env:
          DOTENV: |
            SUPABASE_URL=${{ secrets.SUPABASE_URL }}
            SUPABASE_SERVICE_KEY=${{ secrets.SUPABASE_SERVICE_KEY }}
            PROXY_URL=${{ secrets.PROXY_URL }}
            PROXY_USER=${{ secrets.PROXY_USER }}
            PROXY_PASS=${{ secrets.PROXY_PASS }}
            SMTP_HOST=${{ secrets.SMTP_HOST }}
            SMTP_USER=${{ secrets.SMTP_USER }}
            SMTP_PASS=${{ secrets.SMTP_PASS }}
            ALERT_EMAIL=${{ secrets.ALERT_EMAIL }}
        run: |
          printf '%s' "$DOTENV" | base64 | ssh ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }} \
            "base64 -d > /opt/jobairo/staging/jobAiroDemo/scraper/.env"

      - name: Write Dozzle users.yml
        run: |
          ssh ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }} bash -s << 'SCRIPT'
            set -e
            mkdir -p /opt/jobairo/staging/jobAiroDemo/dozzle
            docker run --rm amir20/dozzle generate \
              "${{ secrets.DOZZLE_USER }}" \
              --password "${{ secrets.DOZZLE_PASSWORD }}" \
              --name "${{ secrets.DOZZLE_USER }}" \
              > /opt/jobairo/staging/jobAiroDemo/dozzle/users.yml
            echo "Dozzle users.yml written."
          SCRIPT

      - name: Build & deploy backend
        run: |
          ssh ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }} << 'EOF'
            set -e
            cd /opt/jobairo/staging/jobAiroDemo
            docker compose build --no-cache backend
            docker compose up -d backend
            sleep 15
            docker compose exec backend curl -sf http://localhost:8000/health || (echo "Backend health check FAILED" && exit 1)
            echo "Backend deployed successfully."
          EOF

      - name: Build & deploy frontend
        continue-on-error: true
        run: |
          ssh ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }} << 'EOF'
            set -e
            cd /opt/jobairo/staging/jobAiroDemo
            docker compose build --no-cache frontend
            docker compose up -d frontend
            echo "Frontend deployed successfully."
          EOF

      - name: Deploy Dozzle
        run: |
          ssh ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }} << 'EOF'
            set -e
            cd /opt/jobairo/staging/jobAiroDemo
            docker compose up -d --force-recreate dozzle
            echo "Dozzle deployed successfully."
          EOF

      - name: Reload Caddy
        if: always()
        run: |
          ssh ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }} \
            "cd /opt/jobairo/staging/jobAiroDemo && docker compose exec caddy caddy reload --config /etc/caddy/Caddyfile"
