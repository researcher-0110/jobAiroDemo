name: Deploy to Production

on:
  push:
    tags:
      - 'v*'

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.PROD_SSH_KEY }}

      - name: Add host to known_hosts
        run: ssh-keyscan -H ${{ secrets.PROD_HOST }} >> ~/.ssh/known_hosts

      - name: Pull latest tag
        run: |
          ssh ${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }} << 'EOF'
            cd /opt/jobairo/staging/jobAiroDemo
            git fetch --tags
            git checkout ${{ github.ref_name }}
          EOF

      - name: Write root .env
        env:
          DOTENV: |
            CADDY_ACME_EMAIL=${{ secrets.CADDY_ACME_EMAIL }}
            NEXT_PUBLIC_SITE_URL=${{ secrets.NEXT_PUBLIC_SITE_URL }}
            NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
            NEXT_PUBLIC_BACKEND_URL=${{ secrets.NEXT_PUBLIC_BACKEND_URL }}
            BACKEND_URL=http://backend:8000
            SUPABASE_URL=${{ secrets.SUPABASE_URL }}
            SUPABASE_SERVICE_KEY=${{ secrets.SUPABASE_SERVICE_KEY }}
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            CORS_ORIGINS=${{ secrets.CORS_ORIGINS }}
            ENVIRONMENT=production
            PROXY_URL=${{ secrets.PROXY_URL }}
            PROXY_USER=${{ secrets.PROXY_USER }}
            PROXY_PASS=${{ secrets.PROXY_PASS }}
            SMTP_HOST=${{ secrets.SMTP_HOST }}
            SMTP_USER=${{ secrets.SMTP_USER }}
            SMTP_PASS=${{ secrets.SMTP_PASS }}
            ALERT_EMAIL=${{ secrets.ALERT_EMAIL }}
            DOZZLE_USER=${{ secrets.DOZZLE_USER }}
            DOZZLE_PASSWORD_HASH=${{ secrets.DOZZLE_PASSWORD_HASH }}
        run: |
          printf '%s' "$DOTENV" | base64 | ssh ${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }} \
            "base64 -d > /opt/jobairo/staging/jobAiroDemo/.env"

      - name: Write frontend .env
        env:
          DOTENV: |
            NEXT_PUBLIC_SITE_URL=${{ secrets.NEXT_PUBLIC_SITE_URL }}
            NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
            NEXT_PUBLIC_BACKEND_URL=${{ secrets.NEXT_PUBLIC_BACKEND_URL }}
            BACKEND_URL=http://backend:8000
        run: |
          printf '%s' "$DOTENV" | base64 | ssh ${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }} \
            "base64 -d > /opt/jobairo/staging/jobAiroDemo/frontend/.env"

      - name: Write backend .env
        env:
          DOTENV: |
            SUPABASE_URL=${{ secrets.SUPABASE_URL }}
            SUPABASE_SERVICE_KEY=${{ secrets.SUPABASE_SERVICE_KEY }}
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            CORS_ORIGINS=${{ secrets.CORS_ORIGINS }}
            PROXY_URL=${{ secrets.PROXY_URL }}
            PROXY_USER=${{ secrets.PROXY_USER }}
            PROXY_PASS=${{ secrets.PROXY_PASS }}
            SMTP_HOST=${{ secrets.SMTP_HOST }}
            SMTP_USER=${{ secrets.SMTP_USER }}
            SMTP_PASS=${{ secrets.SMTP_PASS }}
            ALERT_EMAIL=${{ secrets.ALERT_EMAIL }}
            ENVIRONMENT=production
        run: |
          printf '%s' "$DOTENV" | base64 | ssh ${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }} \
            "base64 -d > /opt/jobairo/staging/jobAiroDemo/backend/.env"

      - name: Write scraper .env
        env:
          DOTENV: |
            SUPABASE_URL=${{ secrets.SUPABASE_URL }}
            SUPABASE_SERVICE_KEY=${{ secrets.SUPABASE_SERVICE_KEY }}
            PROXY_URL=${{ secrets.PROXY_URL }}
            PROXY_USER=${{ secrets.PROXY_USER }}
            PROXY_PASS=${{ secrets.PROXY_PASS }}
            SMTP_HOST=${{ secrets.SMTP_HOST }}
            SMTP_USER=${{ secrets.SMTP_USER }}
            SMTP_PASS=${{ secrets.SMTP_PASS }}
            ALERT_EMAIL=${{ secrets.ALERT_EMAIL }}
        run: |
          printf '%s' "$DOTENV" | base64 | ssh ${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }} \
            "base64 -d > /opt/jobairo/staging/jobAiroDemo/scraper/.env"

      - name: Build & deploy backend
        run: |
          ssh ${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }} << 'EOF'
            set -e
            cd /opt/jobairo/staging/jobAiroDemo
            docker compose build --no-cache backend
            docker compose up -d backend
            sleep 15
            docker compose exec backend curl -sf http://localhost:8000/health || (
              echo "Backend health check FAILED — rolling back..."
              git checkout -
              docker compose build --no-cache backend
              docker compose up -d backend
              exit 1
            )
            echo "Backend deployed: ${{ github.ref_name }}"
          EOF

      - name: Build & deploy frontend
        continue-on-error: true
        run: |
          ssh ${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }} << 'EOF'
            set -e
            cd /opt/jobairo/staging/jobAiroDemo
            docker compose build --no-cache frontend
            docker compose up -d frontend
            echo "Frontend deployed: ${{ github.ref_name }}"
          EOF

      - name: Reload Caddy
        if: always()
        run: |
          ssh ${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }} \
            "cd /opt/jobairo/staging/jobAiroDemo && docker compose exec caddy caddy reload --config /etc/caddy/Caddyfile"
