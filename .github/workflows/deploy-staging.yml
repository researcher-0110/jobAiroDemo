name: Deploy to Staging

on:
  push:
    branches:
      - main
      - develop

jobs:
  deploy:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.STAGING_SSH_KEY }}

      - name: Add host to known_hosts
        run: ssh-keyscan -H ${{ secrets.STAGING_HOST }} >> ~/.ssh/known_hosts

      - name: Pull latest code
        run: |
          ssh ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }} \
            "cd /opt/jobairo/staging/jobAiroDemo && git pull origin ${{ github.ref_name }}"

      - name: Write .env from secrets
        run: |
          cat > /tmp/deploy.env << 'ENVEOF'
          CADDY_ACME_EMAIL=${{ secrets.CADDY_ACME_EMAIL }}
          NEXT_PUBLIC_SITE_URL=${{ secrets.NEXT_PUBLIC_SITE_URL }}
          NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_BACKEND_URL=${{ secrets.NEXT_PUBLIC_BACKEND_URL }}
          BACKEND_URL=http://backend:8000
          SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY=${{ secrets.SUPABASE_SERVICE_KEY }}
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          CORS_ORIGINS=${{ secrets.CORS_ORIGINS }}
          ENVIRONMENT=staging
          PROXY_URL=${{ secrets.PROXY_URL }}
          PROXY_USER=${{ secrets.PROXY_USER }}
          PROXY_PASS=${{ secrets.PROXY_PASS }}
          SMTP_HOST=${{ secrets.SMTP_HOST }}
          SMTP_USER=${{ secrets.SMTP_USER }}
          SMTP_PASS=${{ secrets.SMTP_PASS }}
          ALERT_EMAIL=${{ secrets.ALERT_EMAIL }}
          ENVEOF
          base64 /tmp/deploy.env | ssh ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }} \
            "base64 -d > /opt/jobairo/staging/jobAiroDemo/.env"
          rm /tmp/deploy.env

      - name: Build & deploy backend
        run: |
          ssh ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }} << 'EOF'
            set -e
            cd /opt/jobairo/staging/jobAiroDemo
            docker compose build --no-cache backend
            docker compose up -d backend
            sleep 15
            docker compose exec backend curl -sf http://localhost:8000/health || (echo "Backend health check FAILED" && exit 1)
            echo "Backend deployed successfully."
          EOF

      - name: Build & deploy frontend
        continue-on-error: true
        run: |
          ssh ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }} << 'EOF'
            set -e
            cd /opt/jobairo/staging/jobAiroDemo
            docker compose build --no-cache frontend
            docker compose up -d frontend
            echo "Frontend deployed successfully."
          EOF

      - name: Reload Caddy
        if: always()
        run: |
          ssh ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }} \
            "cd /opt/jobairo/staging/jobAiroDemo && docker compose exec caddy caddy reload --config /etc/caddy/Caddyfile"
