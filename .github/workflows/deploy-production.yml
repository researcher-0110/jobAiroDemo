name: Deploy to Production

on:
  push:
    tags:
      - 'v*'

jobs:
  deploy-backend:
    name: Build & Deploy Backend
    runs-on: ubuntu-latest
    # no environment here — avoids duplicate deployment entries

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.PROD_SSH_KEY }}

      - name: Add host to known_hosts
        run: ssh-keyscan -H ${{ secrets.PROD_HOST }} >> ~/.ssh/known_hosts

      - name: Build and deploy backend
        run: |
          ssh ${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }} << 'EOF'
            set -e
            cd /opt/jobairo/staging/jobAiroDemo
            git fetch --tags
            git checkout ${{ github.ref_name }}

            echo "Building backend..."
            docker compose build --no-cache backend

            echo "Restarting backend..."
            docker compose up -d backend

            echo "Waiting for backend to be healthy..."
            sleep 15
            curl -sf http://localhost:8000/health || (
              echo "Backend health check FAILED — rolling back..."
              git checkout -
              docker compose build backend
              docker compose up -d backend
              exit 1
            )

            echo "Backend deployed: ${{ github.ref_name }}"
          EOF

  deploy-frontend:
    name: Build & Deploy Frontend
    runs-on: ubuntu-latest
    # no environment here — frontend failure won't block backend or caddy

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.PROD_SSH_KEY }}

      - name: Add host to known_hosts
        run: ssh-keyscan -H ${{ secrets.PROD_HOST }} >> ~/.ssh/known_hosts

      - name: Build and deploy frontend
        run: |
          ssh ${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }} << 'EOF'
            set -e
            cd /opt/jobairo/staging/jobAiroDemo

            echo "Building frontend..."
            docker compose build --no-cache \
              --build-arg NEXT_PUBLIC_SITE_URL=${{ secrets.NEXT_PUBLIC_SITE_URL }} \
              --build-arg NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }} \
              --build-arg NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }} \
              --build-arg NEXT_PUBLIC_BACKEND_URL=${{ secrets.NEXT_PUBLIC_BACKEND_URL }} \
              frontend

            echo "Restarting frontend..."
            docker compose up -d frontend

            echo "Frontend deployed: ${{ github.ref_name }}"
          EOF

      - name: Notify on frontend failure
        if: failure()
        run: echo "Frontend deployment FAILED for tag ${{ github.ref_name }} — backend is still running"

  deploy-caddy:
    name: Reload Caddy
    runs-on: ubuntu-latest
    environment: production    # single deployment entry — shows here only
    needs: [deploy-backend, deploy-frontend]
    if: always()               # reload Caddy even if frontend failed

    steps:
      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.PROD_SSH_KEY }}

      - name: Add host to known_hosts
        run: ssh-keyscan -H ${{ secrets.PROD_HOST }} >> ~/.ssh/known_hosts

      - name: Reload Caddy config
        run: |
          ssh ${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }} \
            "cd /opt/jobairo/staging/jobAiroDemo && docker compose exec caddy caddy reload --config /etc/caddy/Caddyfile"
