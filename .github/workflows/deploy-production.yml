name: Deploy to Production

on:
  push:
    tags:
      - 'v*'

jobs:
  deploy:
    name: Deploy to Hetzner Production
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.PROD_SSH_KEY }}

      - name: Add host to known_hosts
        run: |
          ssh-keyscan -H ${{ secrets.PROD_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy via SSH
        run: |
          ssh ${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }} << 'EOF'
            set -e
            cd /opt/jobairo

            echo "Pulling tag ${{ github.ref_name }}..."
            git fetch --tags
            git checkout ${{ github.ref_name }}

            echo "Building and restarting services..."
            docker compose pull caddy
            docker compose build --no-cache frontend backend
            docker compose up -d --remove-orphans

            echo "Waiting for health checks..."
            sleep 15

            echo "Verifying backend health..."
            curl -sf http://localhost:8000/health || (echo "Backend health check FAILED — rolling back" && git checkout - && docker compose up -d --build && exit 1)

            echo "Production deployment complete: ${{ github.ref_name }}"
          EOF

      - name: Notify on failure
        if: failure()
        run: |
          echo "Production deployment FAILED for tag ${{ github.ref_name }}"
